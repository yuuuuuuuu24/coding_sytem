<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Task - 洗練されたタスク管理ツール</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-decor">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div>
                    <h1>AETHER TASK</h1>
                    <span class="subtitle">Focus & Productivity</span>
                </div>
            </div>
            <div class="progress-section">
                <div class="progress-info">
                    <span id="progress-percentage">0%</span>
                    <span class="progress-text">タスク完了</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Panel: Create Task -->
            <aside class="create-panel">
                <h2><i class="fa-solid fa-plus-circle"></i> タスクを作成</h2>
                <form id="task-form" class="task-form">
                    <div class="form-group">
                        <label for="task-title">タイトル <span class="required">*</span></label>
                        <input type="text" id="task-title" placeholder="何をしますか？" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="task-description">説明</label>
                        <textarea id="task-description" rows="3" placeholder="タスクの詳細（任意）"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-priority">優先度</label>
                            <select id="task-priority">
                                <option value="Low">低 (Low)</option>
                                <option value="Medium" selected>中 (Medium)</option>
                                <option value="High">高 (High)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-due-date">期限</label>
                            <input type="date" id="task-due-date">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fa-solid fa-plus"></i> タスクを追加
                    </button>
                </form>
            </aside>

            <!-- Right Panel: Task List -->
            <section class="list-panel">
                <div class="filter-bar">
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all">すべて <span class="badge" id="count-all">0</span></button>
                        <button class="filter-tab" data-filter="active">未完了 <span class="badge" id="count-active">0</span></button>
                        <button class="filter-tab" data-filter="completed">完了 <span class="badge" id="count-completed">0</span></button>
                    </div>
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="task-search" placeholder="タスクを検索...">
                    </div>
                </div>

                <div class="task-list" id="task-list">
                    <!-- Tasks injected by JS -->
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>タスクを読み込み中...</p>
                    </div>
                </div>
            </section>
        </div>

        <footer>
            <p>&copy; 2026 Aether Task. Elegance in organization.</p>
        </footer>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-pen-to-square"></i> タスクを編集</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-task-id">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="edit-title">タイトル <span class="required">*</span></label>
                        <input type="text" id="edit-title" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-description">説明</label>
                        <textarea id="edit-description" rows="4"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-priority">優先度</label>
                            <select id="edit-priority">
                                <option value="Low">低 (Low)</option>
                                <option value="Medium">中 (Medium)</option>
                                <option value="High">高 (High)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-due-date">期限</label>
                            <input type="date" id="edit-due-date">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-edit">キャンセル</button>
                    <button type="submit" class="btn btn-primary">変更を保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
